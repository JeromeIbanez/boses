databases:
  - name: boses-db-prod
    databaseName: boses_prod
    user: boses
    plan: free

  - name: boses-db-staging
    databaseName: boses_staging
    user: boses
    plan: free

services:
  # ── Production Backend ──────────────────────────────────────────────────
  - type: web
    name: boses-backend-prod
    runtime: docker
    dockerfilePath: ./Dockerfile
    rootDir: backend
    branch: main
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: boses-db-prod
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: UPLOAD_DIR
        value: /tmp/uploads
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_AVATARS_BUCKET
        value: avatars
      - key: RESEND_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://app.temujintechnologies.com
      - key: ENVIRONMENT
        value: production
    domains:
      - api.temujintechnologies.com

  # ── Staging Backend ─────────────────────────────────────────────────────
  - type: web
    name: boses-backend-staging
    runtime: docker
    dockerfilePath: ./Dockerfile
    rootDir: backend
    branch: staging
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: boses-db-staging
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: UPLOAD_DIR
        value: /tmp/uploads
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_AVATARS_BUCKET
        value: avatars
      - key: RESEND_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://staging.temujintechnologies.com
      - key: ENVIRONMENT
        value: staging
    domains:
      - api-staging.temujintechnologies.com

  # ── Production Frontend ─────────────────────────────────────────────────
  - type: web
    name: boses-frontend-prod
    runtime: docker
    dockerfilePath: ./Dockerfile
    rootDir: frontend
    branch: main
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://api.temujintechnologies.com/api/v1
    domains:
      - app.temujintechnologies.com

  # ── Staging Frontend ────────────────────────────────────────────────────
  - type: web
    name: boses-frontend-staging
    runtime: docker
    dockerfilePath: ./Dockerfile
    rootDir: frontend
    branch: staging
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://api-staging.temujintechnologies.com/api/v1
    domains:
      - staging.temujintechnologies.com

  # ── Landing Page ─────────────────────────────────────────────────────────
  - type: web
    name: boses-landing
    runtime: static
    staticPublishPath: ./landing
    branch: main
    plan: free
    domains:
      - www.temujintechnologies.com
